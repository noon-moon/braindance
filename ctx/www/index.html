<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>braindance</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font: 16px/1.6 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: #0b0e0f; color: #d7dee3;
    }
    main { padding: 2rem; max-width: 34rem; text-align: center; }
    h1 { font-size: 2.4rem; margin: 0 0 1rem; letter-spacing: -0.01em; }
    p { margin: 0 0 1.6rem; opacity: .8; }
    .accent { color: #5ef2b8; }
    nav { display: flex; gap: .6rem; justify-content: center; flex-wrap: wrap; }
    nav a {
      display: inline-block; color: #d7dee3; text-decoration: none;
      border: 1px solid #232a30; padding: .5rem 1rem; border-radius: 4px;
    }
    nav a:hover { border-color: #5ef2b8; color: #5ef2b8; }
    @media (prefers-color-scheme: light) {
      body { background: #faf8f8; color: #2b2b2b; }
      nav a { color: #2b2b2b; border-color: #ddd; }
    }
  </style>
</head>
<body>
  <main>
    <h1>brain<span class="accent">dance</span></h1>
    <p>A personal homepage. Edit <code>ctx/www/index.html</code> to make it yours.</p>
    <!-- Author links RELATIVE (./garden/, not /garden/) so the site works both
         under a project path (owner.github.io/repo/) and a custom domain. -->
    <nav>
      <a href="./garden/">[garden]</a>
    </nav>
  </main>
</body>
</html>
